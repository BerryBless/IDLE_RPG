# IDLE_RPG 컨테이너 스택 — GameServer/AuthServer/MonitorServer + MongoDB.
# 설계: plan/docker_compose_0719.md. `.env`(직접 생성, .env.example 참고)에서
# IDLERPG_AUTH_HMAC_SECRET을 반드시 설정해야 authserver/gameserver가 기동한다(Release fail-fast).
#
# 포트 노출 원칙: 8080(대시보드)·7777(게임)·7778(로그인)만 호스트에 publish한다.
# 7779(텔레메트리, 인증 없음)·27017(mongo)은 절대 publish하지 않는다 — idlerpg-net 내부에서만
# 도달 가능해야 텔레메트리 무인증 리스너와 DB가 외부에 노출되지 않는다.
#
# 실행: up.bat(빌드+기동) / down.bat(정지) / logs.bat(로그 추적) / seed.bat(더미 계정 3000개 시딩).
#
# restart: "no" — 크래시가 나도 Docker가 자동으로 재시작하지 않는다(의도적 선택, 2026-07-19).
# 처음엔 restart: always로 뒀으나, 설정 오류(예: .env의 HMAC 시크릿 손상) 같은 문제가 있으면
# 무한 크래시 루프로 CPU/로그만 계속 소모하며 문제가 표면화되지 않는 부작용이 있어 되돌렸다.
# 크래시가 나면 컨테이너는 멈춘 채로 남고 `docker compose ps`에 Exited로 명확히 보이므로, 원인을
# 고친 뒤 up.bat으로 다시 올린다. 대신 이 정책은 호스트/Docker 재부팅 후에도 자동으로 다시 뜨지
# 않는다 — 재부팅 후 다시 올리려면 up.bat을 한 번 더 실행해야 한다(plan/docker_compose_0719.md 참고).

services:
  mongo:
    image: mongo:7
    restart: "no"
    volumes:
      - mongo-data:/data/db
    networks: [idlerpg-net]
    healthcheck:
      # authserver의 dotnet MongoDB.Driver는 자체 재시도(server selection)를 하지만, 최초 기동 시
      # 몇 초간 불필요한 재시도 로그가 쌓이는 걸 막기 위해 healthy가 될 때까지 authserver 시작을 늦춘다.
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    # ports: 의도적으로 미publish — mongo는 idlerpg-net 내부(authserver)에서만 접근한다.

  authserver:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PROJECT: AuthServer
        RUNTIME_IMAGE: mcr.microsoft.com/dotnet/runtime:10.0
    restart: "no"
    environment:
      IDLERPG_AUTH_BIND: 0.0.0.0
      IDLERPG_AUTH_PORT: "7778"
      IDLERPG_MONGO_CONN: mongodb://mongo:27017
      IDLERPG_MONGO_DB: idlerpg
      # gameserver와 반드시 동일한 값이어야 GameServer가 AuthServer 발급 토큰을 검증할 수 있다.
      IDLERPG_AUTH_HMAC_SECRET: ${IDLERPG_AUTH_HMAC_SECRET:?IDLERPG_AUTH_HMAC_SECRET을 .env에 설정하세요(.env.example 참고, 32바이트 이상)}
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "7778:7778" # 호스트 클라이언트가 직접 로그인할 수 있도록 publish (필요 없으면 제거 가능).
    networks: [idlerpg-net]

  gameserver:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PROJECT: GameServer
        RUNTIME_IMAGE: mcr.microsoft.com/dotnet/runtime:10.0
    restart: "no"
    environment:
      IDLERPG_GAME_BIND: 0.0.0.0
      IDLERPG_GAME_PORT: "7777"
      IDLERPG_GAME_TELEMETRY_PORT: "7779"
      # authserver와 반드시 동일한 값 — 공유 시크릿(네트워크 통신 없이 토큰만으로 검증).
      IDLERPG_AUTH_HMAC_SECRET: ${IDLERPG_AUTH_HMAC_SECRET:?IDLERPG_AUTH_HMAC_SECRET을 .env에 설정하세요(.env.example 참고, 32바이트 이상)}
      # [DoS 하드닝 — 운영 시 반드시 검토] 아래 3종은 opt-in이라 미설정 시 기존 동작(무제한)을 보존한다.
      # 스트레스 하네스(plan/stress_harness_0721.md)가 실증하듯 미설정 배포는 slowloris·오버사이즈 헤더
      # 증폭·프레임 플러드·연결 폭주에 그대로 노출된다(코드리뷰 Medium, CWE-770). 값은 배포 규모·머신에
      # 따라 다르고 과소 설정은 정상 트래픽을 끊으므로 하드 기본값 대신 예시로 제공한다 — 운영 전 조정 후 주석 해제.
      #   IDLERPG_GAME_MAX_CONNECTIONS: "50000"        # 동시 연결 상한(머신 용량에 맞춰 조정)
      #   IDLERPG_GAME_MAX_FRAMES_PER_SECOND: "100"     # 세션당 초당 프레임 상한(정상 클라는 인증 1회+주기 PING이라 여유 하회)
      #   IDLERPG_GAME_IDLE_TIMEOUT_SECONDS: "120"      # 진행 기준 유휴 스윕 — 클라 PING 주기보다 커야 정상 연결 오판 없음(하트비트 프로토콜 도입 후 활성화 권장)
    ports:
      - "7777:7777" # 게임 포트만 publish. 7779(텔레메트리)는 의도적으로 publish하지 않음.
    networks: [idlerpg-net]

  monitorserver:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PROJECT: MonitorServer
        RUNTIME_IMAGE: mcr.microsoft.com/dotnet/aspnet:10.0 # Microsoft.NET.Sdk.Web(ASP.NET Core) 필요.
    restart: "no"
    environment:
      IDLERPG_MONITOR_WEB_BIND: 0.0.0.0
      IDLERPG_MONITOR_WEB_PORT: "8080"
      # 서비스명(gameserver)은 idlerpg-net 내부 DNS로 해석된다(Docker 기본 브리지 네트워크 임베디드 DNS).
      IDLERPG_MONITOR_GAME_HOST: gameserver
      IDLERPG_MONITOR_GAME_TELEMETRY_PORT: "7779"
    depends_on:
      - gameserver # soft 의존성: 없어도 기동은 되고 TelemetryClientLoop가 자동 재접속한다.
    ports:
      - "8080:8080"
    networks: [idlerpg-net]

  webclient:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PROJECT: WebClient
        RUNTIME_IMAGE: mcr.microsoft.com/dotnet/aspnet:10.0 # Microsoft.NET.Sdk.Web(ASP.NET Core) 필요.
    restart: "no"
    environment:
      IDLERPG_WEBCLIENT_WEB_BIND: 0.0.0.0
      IDLERPG_WEBCLIENT_WEB_PORT: "8081"
      # 서비스명(gameserver)은 idlerpg-net 내부 DNS로 해석된다(monitorserver와 동일).
      IDLERPG_WEBCLIENT_GAME_HOST: gameserver
      IDLERPG_WEBCLIENT_GAME_PORT: "7777"
      # gameserver와 반드시 동일한 값 — 게스트 토큰을 이 프로세스가 직접 발급(HmacAuthTokenCodec)하므로
      # 시크릿이 다르면 모든 게스트 인증이 게이트에서 거부된다.
      IDLERPG_AUTH_HMAC_SECRET: ${IDLERPG_AUTH_HMAC_SECRET:?IDLERPG_AUTH_HMAC_SECRET을 .env에 설정하세요(.env.example 참고, 32바이트 이상)}
    depends_on:
      - gameserver # soft 의존성: 없어도 기동은 되고, 입장 시 연결 오류를 브라우저에 안내한다.
    ports:
      - "8081:8081" # 게스트 플레이 페이지(브라우저 대면 포트만 publish).
    networks: [idlerpg-net]

volumes:
  mongo-data:

networks:
  idlerpg-net:
    driver: bridge
